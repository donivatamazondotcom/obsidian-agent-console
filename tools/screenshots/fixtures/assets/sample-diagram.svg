<svg xmlns="http://www.w3.org/2000/svg" width="720" height="420" viewBox="0 0 720 420" font-family="Inter, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="720" height="420" rx="14" fill="#ffffff"/>
  <rect x="0.5" y="0.5" width="719" height="419" rx="14" fill="none" stroke="#e3e8ef" stroke-width="1"/>

  <text x="40" y="58" font-size="26" font-weight="700" fill="#1f2937">Data Pipeline Overview</text>
  <text x="40" y="86" font-size="15" fill="#6b7280">Ingest, transform, and serve in four stages</text>

  <!-- Stage 1: Ingest -->
  <rect x="40" y="150" width="140" height="90" rx="12" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="110" y="190" font-size="16" font-weight="600" fill="#075985" text-anchor="middle">Ingest</text>
  <text x="110" y="214" font-size="12" fill="#0369a1" text-anchor="middle">Sources &amp; APIs</text>

  <!-- arrow -->
  <line x1="180" y1="195" x2="220" y2="195" stroke="#94a3b8" stroke-width="2.5"/>
  <polygon points="220,189 234,195 220,201" fill="#94a3b8"/>

  <!-- Stage 2: Transform -->
  <rect x="234" y="150" width="140" height="90" rx="12" fill="#ccfbf1" stroke="#0d9488" stroke-width="2"/>
  <text x="304" y="190" font-size="16" font-weight="600" fill="#115e59" text-anchor="middle">Transform</text>
  <text x="304" y="214" font-size="12" fill="#0f766e" text-anchor="middle">Clean &amp; enrich</text>

  <line x1="374" y1="195" x2="414" y2="195" stroke="#94a3b8" stroke-width="2.5"/>
  <polygon points="414,189 428,195 414,201" fill="#94a3b8"/>

  <!-- Stage 3: Store -->
  <rect x="428" y="150" width="140" height="90" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="498" y="190" font-size="16" font-weight="600" fill="#92400e" text-anchor="middle">Store</text>
  <text x="498" y="214" font-size="12" fill="#b45309" text-anchor="middle">Warehouse</text>

  <!-- Stage 4: Serve -->
  <rect x="540" y="280" width="140" height="90" rx="12" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="610" y="320" font-size="16" font-weight="600" fill="#5b21b6" text-anchor="middle">Serve</text>
  <text x="610" y="344" font-size="12" fill="#6d28d9" text-anchor="middle">Dashboards</text>

  <!-- elbow connector Store -> Serve -->
  <path d="M498 240 L498 325 L540 325" fill="none" stroke="#94a3b8" stroke-width="2.5"/>
  <polygon points="534,319 548,325 534,331" fill="#94a3b8"/>

  <!-- footnote chips -->
  <rect x="40" y="300" width="90" height="30" rx="15" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="85" y="320" font-size="12" fill="#475569" text-anchor="middle">batch</text>
  <rect x="140" y="300" width="90" height="30" rx="15" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="185" y="320" font-size="12" fill="#475569" text-anchor="middle">streaming</text>
</svg>
