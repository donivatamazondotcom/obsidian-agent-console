name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint src/

      - name: Fixture path leak guard
        run: |
          # Tracked smoke/screenshot fixture settings (data*.json under any
          # .obsidian/plugins/*/) must not embed an absolute home path — that is
          # a personal-data leak via fixture seeding. Bare command names resolve
          # via the plugin's login-shell PATH probe instead, so absolute paths
          # are never required here.
          files=$(git ls-files | grep -E '\.obsidian/plugins/[^/]+/data[^/]*\.json$' || true)
          if [ -n "$files" ]; then
            hits=$(echo "$files" | xargs grep -nE '/(Users|home)/' || true)
            if [ -n "$hits" ]; then
              echo "::error::Absolute home path in tracked fixture settings (personal-data leak):"
              echo "$hits"
              exit 1
            fi
          fi
          echo "OK — no absolute home paths in tracked fixture settings"

      - name: Load-time registration guards (I157)
        run: |
          # 1. The chat view must never be registered directly — it must go
          #    through registerChatViewSafely so a duplicate view-type collision
          #    with another plugin (I157) degrades to a notice, not an onload crash.
          if grep -rnE 'this\.registerView\(' src/ --include='*.ts' --include='*.tsx' | grep -v '__tests__'; then
            echo "::error::Direct this.registerView() found — use registerChatViewSafely (I157)."
            exit 1
          fi
          # 2. onload must keep routing registrations through the guarded harness.
          if ! grep -q 'runRegistrations(' src/plugin.ts; then
            echo "::error::plugin.ts no longer calls runRegistrations() — onload registration harness (I157) removed."
            exit 1
          fi
          echo "OK — chat view guarded; onload registration harness present"
      - name: Build
        run: npm run build

      - name: Type-check benchmark
        run: npm run typecheck:bench

      - name: Test
        run: npm test

      - name: Screenshot consistency
        run: npm run docs:screenshots:check

      # Gate B-v1 (perf) — phase 1: warn-only / observe.
      # Surfaces benchmark numbers so we can learn the noise floor (spec QG4).
      # Does NOT diff against the committed perf-baseline.json: that baseline is
      # seeded on the maintainer's hardware, and ubuntu runners differ enough that
      # a cross-hardware diff would be noise. Same-runner base-vs-PR comparison
      # and the flip to blocking are phase 2.
      - name: Perf benchmarks (warn-only)
        continue-on-error: true
        run: npm run bench

  dependency-review:
    runs-on: ubuntu-latest
    # Surfaces new/changed dependencies in the PR diff and flags
    # known-vulnerable packages — covers the supply-chain egress vector the
    # source-only no-unsanctioned-network tripwire cannot see. PR-only; no-ops
    # on push to main.
    if: github.event_name == 'pull_request'
    # Advisory, not a hard gate: surfaces dependency findings in the PR but does
    # not block merge (CODEOWNERS review is the blocking control), and keeps CI
    # green if the org-managed Dependency Graph setting is ever disabled again.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          comment-summary-in-pr: on-failure